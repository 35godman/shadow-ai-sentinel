version: "3.9"

# ============================================================
# Shadow AI Sentinel — Local Development / On-Prem Base Stack
# Usage: docker compose -f infra/docker-compose.yml up -d
# ============================================================

services:
  # --- Primary Database ---
  postgres:
    image: postgres:16-alpine
    container_name: sentinel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel-dev-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Session Cache + Rate Limiting ---
  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-sentinel-dev-redis}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-sentinel-dev-redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

