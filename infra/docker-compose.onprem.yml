  #     - ENVIRONMENT=production
  #   depends_on:
  #     postgres: { condition: service_healthy }
  #     redis: { condition: service_healthy }
  #     ollama: { condition: service_started }
  #   networks:
  #     - sentinel-net

  # Phase 3: Dashboard
  # dashboard:
  #   build: ../apps/dashboard
  #   container_name: sentinel-dashboard
  #   ports:
  #     - "3000:3000"
  #   networks:
  #     - sentinel-net

volumes:
  postgres-data:
  redis-data:
  ollama-data:

networks:
  sentinel-net:
    driver: bridge
    # For true air-gap, no external connectivity:
    internal: false  # Set to true to prevent any external network access
